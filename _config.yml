  - title: Education
    layout: list
    content:
      - layout: left
        title: Lahore University of Management Sciences (LUMS)
        sub_title: B.Sc. in Computer Science
        caption: Expected May 2026 · Lahore, Pakistan
        description: |
          Coursework and projects spanning software engineering, machine learning, statistics, and systems.

  - title: Experience
    layout: list
    content:
      - layout: left
        title: Confiz Limited
        sub_title: AI Engineering Intern
        caption: Jun 2025 – Jul 2025 · Lahore, Pakistan
        description: |
          - Built and deployed an agentic reconciliation pipeline to classify financial documents and perform 2/3-way matching (invoices, POs, GRNs), cutting manual review time by 85% with under 50s processing per file.
          - Engineered an end-to-end pipeline to detect vendor/amount mismatches and flag missing documents, automatically escalating uncertain cases to audit review.
          - Analyzed sentiment across 1,000+ customer calls using Azure OpenAI with multi-label tagging; surfaced results via Power BI dashboards and automated alerts, cutting service-issue triage from ~3 days to under 1 day.
          - **Tech stack:** Python (pandas, scikit-learn), FastAPI, Next.js/React (TypeScript), Azure OpenAI, Power BI, Git

      - layout: left
        title: Lahore University of Management Sciences (LUMS)
        sub_title: Teaching Assistant – Statistics for Humanities
        caption: Sep 2025 – Dec 2025
        description: |
          - Supported 60+ students through weekly lab sessions and homework grading; provided one-on-one tutoring to 20+ students on statistical concepts and data interpretation.

  - title: Projects
    layout: list
    content:
      - layout: left
        title: Granite Inventory & Order Management System
        caption: Senior Year Project · Sept 2025 – Present
        description: |
          - Built and deployed a full-stack platform in production for a granite manufacturer, digitizing inventory, quotations, orders, and dispatch — cut quote turnaround by ~60%.
          - Shipped AI demand forecasting (250+ SKUs, auto-PO generation) and a Gradient Boosting Regressor for quote pricing (R² = 0.95) — deployed as Python microservices in sales and procurement flows.
          - Deployed and maintained on Oracle Kubernetes Engine with a full CI/CD pipeline, serving 100+ concurrent users.
          - Secured a 25+ endpoint REST API with role-based access, rate limiting, and audit logging. Added QR-based block tracking for real-time inventory visibility.
          - **Tech stack:** Node.js, React 19, Express, MongoDB, JWT, Tailwind, Cloudinary, Docker, OKE, Vercel

      - layout: left
        title: Go-Kart Booking Platform
        caption: Jan 2025 – May 2025
        description: |
          - Implemented a full-stack booking platform with the MERN stack featuring JWT authentication, bcrypt-secured accounts, and integrated payment gateway processing.
          - Built a responsive React UI with real-time GPS tracking, dynamic leaderboards, and live race status updates.
          - **Tech stack:** MongoDB, Express, React, Node.js, Mongoose, Axios

  - title: Research
    layout: list
    content:
      - layout: left
        title: AI-Authored Software Maintenance Analysis
        sub_title: Empirical Software Engineering – Hindle’s Taxonomy
        description: |
          - Conducting a large-scale comparative study of 3,300 AI-authored vs. 2,900 human commits across 1,495 GitHub repositories using Hindle’s maintenance taxonomy.
          - Developed an LLM-assisted commit classification pipeline (few-shot prompting, human validation checkpoints) across 6,200+ commits; built custom datasets recovering missing diffs via the GitHub API.
          - Findings show AI agents closely mirror human adaptive and perfective maintenance patterns, with statistical analysis confirming distributional similarity.

