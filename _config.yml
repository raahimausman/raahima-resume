about_content: |
  Computer science student at LUMS with hands-on experience in <mark>AI engineering</mark>, <mark>full-stack development</mark>, and <mark>empirical software engineering research</mark>. I have shipped production systems on Kubernetes, built agentic ML pipelines, and led coursework support as a teaching assistant.

